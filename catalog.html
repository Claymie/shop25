<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mopsik shop | CATALOG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; color: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

        body {
            background: linear-gradient(-45deg, #000, #1a1a1a, #050505, #111);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            cursor: none;
            padding-bottom: 50px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .cursor-dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; mix-blend-mode: difference; }
        .cursor-outline { width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: 0.1s; }

        nav {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between;
            padding: 20px 50px; background: rgba(0,0,0,0.95);
            z-index: 1000; border-bottom: 1px solid #222;
            align-items: center;
        }
        .logo { font-weight: bold; letter-spacing: 3px; text-transform: lowercase; font-size: 1.2rem; text-decoration: none; color: #fff; }

        .filter-bar {
            margin-top: 120px;
            display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; padding: 20px;
        }
        .filter-btn {
            background: transparent; border: 1px solid #222; color: #444;
            padding: 10px 20px; text-transform: uppercase; letter-spacing: 2px;
            font-size: 0.65rem; cursor: none; transition: 0.3s;
        }
        .filter-btn:hover, .filter-btn.active { border-color: #fff; color: #fff; background: rgba(255,255,255,0.05); }

        .catalog-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px; width: 90%; max-width: 1400px; margin: 30px auto;
        }

        .product-card {
            background: rgba(10,10,10,0.4); border: 1px solid #1a1a1a;
            padding: 20px; transition: 0.5s; position: relative;
            display: flex; flex-direction: column;
        }
        .product-card:hover { border-color: #fff; transform: translateY(-5px); }

        .status-tag {
            position: absolute; top: 15px; right: 15px; font-size: 9px;
            letter-spacing: 1px; color: #fff; border: 1px solid #fff;
            padding: 2px 8px; text-transform: uppercase; z-index: 5;
        }

        .product-img {
            width: 100%; height: 320px; background: #000; margin-bottom: 20px;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 1px solid #111;
        }
        .product-img img { width: 100%; height: 100%; object-fit: contain; opacity: 0.8; transition: 0.5s; }
        .product-card:hover img { opacity: 1; transform: scale(1.05); }

        .info { text-align: left; margin-bottom: 15px; }
        .info span { color: #fff; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; }
        .info p { color: #555; font-size: 0.7rem; margin: 8px 0; height: 32px; overflow: hidden; }
        .info b { display: block; font-size: 1.1rem; letter-spacing: -1px; }

        .buy-btn {
            width: 100%; background: transparent; border: 1px solid #333;
            color: #fff; padding: 12px; text-transform: uppercase;
            font-size: 0.7rem; letter-spacing: 2px; cursor: none;
            transition: 0.3s; text-decoration: none; display: block; text-align: center;
        }
        .buy-btn:hover { background: #fff; color: #000; border-color: #fff; }

        /* ТАБЛИЦА РАЗМЕРОВ */
        .size-guide {
            width: 90%; max-width: 800px; margin: 100px auto;
            text-align: center; padding: 40px; border: 1px solid #1a1a1a;
            background: rgba(5,5,5,0.5);
        }
        .size-guide h2 { letter-spacing: 10px; font-weight: 100; color: #444; margin-bottom: 30px; text-transform: uppercase; }
        
        .tab-controls { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn {
            background: transparent; border: 1px solid #222; color: #444;
            padding: 8px 20px; font-size: 0.6rem; letter-spacing: 2px;
            cursor: none; transition: 0.3s;
        }
        .tab-btn.active { border-color: #fff; color: #fff; }

        .size-table {
            width: 100%; border-collapse: collapse; display: none; margin: 0 auto;
        }
        .size-table.active { display: table; }
        .size-table th, .size-table td {
            border: 1px solid #111; padding: 15px; font-size: 0.75rem; letter-spacing: 1px;
        }
        .size-table th { color: #444; text-transform: uppercase; font-weight: normal; }
        .size-table tr:hover td { background: rgba(255,255,255,0.02); }

        footer { padding: 40px; text-align: center; border-top: 1px solid #111; color: #222; font-size: 0.6rem; letter-spacing: 5px; }
    </style>
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <nav>
        <a href="index.html" class="logo">mopsik shop</a>
        <div style="font-size: 0.6rem; letter-spacing: 3px; color: #444;">SELECTIVE ARCHIVE STORE</div>
    </nav>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterItems('all')">ВСЕ ВЕЩИ</button>
        <button class="filter-btn" onclick="filterItems('Rick Owens')">RICK OWENS</button>
        <button class="filter-btn" onclick="filterItems('Chrome Hearts')">CHROME HEARTS</button>
        <button class="filter-btn" onclick="filterItems('Yohji Yamamoto')">YOHJI YAMAMOTO</button>
        <button class="filter-btn" onclick="filterItems('ERD')">ERD</button>
    </div>

    <div class="catalog-grid" id="fullCatalog"></div>

    <div class="size-guide">
        <h2>ГИД ПО РАЗМЕРАМ</h2>
        <div class="tab-controls">
            <button class="tab-btn active" id="btn-shoes" onclick="toggleTable('shoes')">ОБУВЬ</button>
            <button class="tab-btn" id="btn-cloth" onclick="toggleTable('cloth')">ОДЕЖДА</button>
        </div>

        <table class="size-table active" id="table-shoes">
            <tr><th>EU РАЗМЕР</th><th>САНТИМЕТРЫ</th><th>US MEN</th></tr>
            <tr><td>40</td><td>25.5 см</td><td>7</td></tr>
            <tr><td>41</td><td>26.5 см</td><td>8</td></tr>
            <tr><td>42</td><td>27.0 см</td><td>9</td></tr>
            <tr><td>43</td><td>28.0 см</td><td>10</td></tr>
            <tr><td>44</td><td>28.5 см</td><td>11</td></tr>
            <tr><td>45</td><td>29.5 см</td><td>12</td></tr>
        </table>

        <table class="size-table" id="table-cloth">
            <tr><th>РАЗМЕР</th><th>EU / IT</th><th>ОБХВАТ ГРУДИ</th></tr>
            <tr><td>S</td><td>46</td><td>92-96 см</td></tr>
            <tr><td>M</td><td>48</td><td>96-100 см</td></tr>
            <tr><td>L</td><td>50</td><td>100-104 см</td></tr>
            <tr><td>XL</td><td>52</td><td>104-108 см</td></tr>
            <tr><td>XXL</td><td>54</td><td>108-112 см</td></tr>
        </table>
    </div>

    <footer>MOPSIK SHOP — ARCHIVE PIECES ONLY</footer>

    <script>
        const allItems = [
            { b: 'Rick Owens', n: 'Geobasket Leather "Milk"', p: '120 000 ₽', url: 'https://www.sneakinpeace.com/cdn/shop/files/rick-owens-Black_Off-WhiteGeobasketSneakers-1_800x1000.jpg.jpg?v=1712244463' }, 
            { b: 'Rick Owens', n: 'Mainline Ramones High', p: '95 000 ₽', url: 'https://acroera.com/cdn/shop/files/rick-owens-double-bumper-ramones.webp?v=1693839488' },
            { b: 'Yohji Yamamoto', n: 'Deconstructed Wool Coat', p: '145 000 ₽', url: 'https://a.1stdibscdn.com/yohji-yamamoto-wonderfully-draped-black-brush-wool-deconstructed-trench-coat-for-sale/1121189/v_134766221634029916222/13476622_datamatics.jpeg?width=768' },
            { b: 'Chrome Hearts', n: 'Silver Ring "Forever"', p: '48 000 ₽', url: 'https://i0.wp.com/best-rings.com/wp-content/uploads/2023/08/v_19299082_1684199027663_bg_processed.jpg?fit=1384%2C1384&ssl=1' },
            { b: 'Chrome Hearts', n: 'Dagger Silver Pendant', p: '35 000 ₽', url: 'https://i.ebayimg.com/images/g/CyAAAeSwPVZosmDh/s-l1600.jpg' },
            { b: 'Rick Owens', n: 'Gimp Hoodie Black', p: '65 000 ₽', url: 'https://cdna.lystit.com/photos/italist/7c577662/rick-owens-drkshdw-Black-Gimp-Zip-Hoodie.jpeg' },
            { b: 'Rick Owens', n: 'Tyrone Cut Waxed Jeans', p: '58 000 ₽', url: 'https://ypcollective.com/cdn/shop/products/IMG_7700_1deed4ab-e53c-45ef-a841-c25998c54e9c.webp?v=1707027475&width=1946' },
            { b: 'Chrome Hearts', n: 'Trucker Hat Black/White', p: '25 000 ₽', url: 'https://www.stealthny.com/cdn/shop/files/chcalf_jpg.webp?v=1767063192&width=2048' },
            { b: 'Chrome Hearts', n: 'Leather Cross Patch Pant', p: '280 000 ₽', url: 'https://savonches.com/cdn/shop/files/PhotoAug142024_41746PM.jpg?v=1723673966&width=416' },
            { b: 'Yohji Yamamoto', n: 'Signature Logo Tote Bag', p: '22 000 ₽', url: 'https://editorialist.com/thumbnails/600/2022/10/022/226/744/22226744~black_0.webp' },
            { b: 'Yohji Yamamoto', n: 'Balloon Pants Silk Mix', p: '72 000 ₽', url: 'https://d2u1z1lopyfwlx.cloudfront.net/thumbnails/74e57ef2-5ac3-5685-b5e3-28f03b504400/c5732148-144e-5494-a2ee-03c5ac7fe21c.jpg' },
            { b: 'ERD', n: 'Distressed Cashmere Sweater', p: '130 000 ₽', url: 'https://d2u1z1lopyfwlx.cloudfront.net/thumbnails/1d2763fc-df20-5dac-9c2a-760dcc70543a/7df5ff85-332b-52e8-bf40-483e37308b6a.jpg' },
            { b: 'ERD', n: 'Leather Beret with Pins', p: '45 000 ₽', url: 'https://st.perplexity.ai/estatic/0b226c450798410ac541646c86ec31afd840e5beab817a5d84fa821e7db61981ec84c3b4a3f072a7a2e1899c9fb06c6e49d91aca0811239122b94d5adec9e064f23d9cbe747bde27c2fe9566beeabb1f6e1a1d92e5eb9faf83299effad61e672' },
            { b: 'Rick Owens', n: 'Bozo Tractor Boots', p: '135 000 ₽', url: 'https://d2u1z1lopyfwlx.cloudfront.net/thumbnails/d5427bec-9b8c-5ad5-bc37-e221102dad42/b708b844-245f-559e-b42f-c69e41f1862a.jpg' },
            { b: 'Chrome Hearts', n: 'Rolling Stones Zip Up', p: '160 000 ₽', url: 'https://d2u1z1lopyfwlx.cloudfront.net/thumbnails/f8f10b69-eb37-5ad2-90d0-d6b3e526aa5a/252b48ec-cc2a-5738-b293-c6f41bceac7c.jpg' }
        ];

        const catalog = document.getElementById('fullCatalog');

        function render(data) {
            catalog.innerHTML = '';
            data.forEach(item => {
                catalog.innerHTML += `
                    <div class="product-card">
                        <div class="status-tag">IN STOCK</div>
                        <div class="product-img"><img src="${item.url}" alt="${item.b}"></div>
                        <div class="info">
                            <span>${item.b}</span>
                            <p>${item.n}</p>
                            <b>${item.p}</b>
                        </div>
                        <a href="index.html#order" class="buy-btn">КУПИТЬ / ЗАКАЗАТЬ</a>
                    </div>
                `;
            });
        }

        function filterItems(brand) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const btnText = btn.innerText.toLowerCase();
                if (brand === 'all') btn.classList.toggle('active', btnText === 'все вещи');
                else btn.classList.toggle('active', btnText === brand.toLowerCase());
            });
            if(brand === 'all') render(allItems);
            else render(allItems.filter(i => i.b.toLowerCase() === brand.toLowerCase()));
        }

        function toggleTable(type) {
            document.querySelectorAll('.size-table').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(type === 'shoes') {
                document.getElementById('table-shoes').classList.add('active');
                document.getElementById('btn-shoes').classList.add('active');
            } else {
                document.getElementById('table-cloth').classList.add('active');
                document.getElementById('btn-cloth').classList.add('active');
            }
        }

        render(allItems);

        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        document.addEventListener('mousemove', e => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            outline.style.left = e.clientX - 11 + 'px';
            outline.style.top = e.clientY - 11 + 'px';
        });
    </script>
</body>
</html>
